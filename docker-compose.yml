services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-caiyan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-caiyan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caiyan_internal

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caiyan_internal

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      APP_MODE: api
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/caiyan}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKERS: ${WORKERS:-4}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caiyan_internal

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      APP_MODE: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/caiyan}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caiyan_internal

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - caiyan_internal

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  caiyan_internal:
    driver: bridge
